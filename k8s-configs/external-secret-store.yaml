apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: my-app-secret
  namespace: default
spec:
  refreshInterval: "1m" # refresh every 1 minute, adjust as needed
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: ms-secret-vault # k8s secret name to create/update
    creationPolicy: Owner
  data:
    - secretKey: MYSQL_PASSWORD # K8s Secret Key
      remoteRef:
        key: ceramicraft    # Vault path
        property: MYSQL_PASSWORD   # Vault 里的 Key
    - secretKey: JWT_SECRET
      remoteRef:
        key: ceramicraft
        property: JWT_SECRET
    - secretKey: SMTP_EMAIL_FROM
      remoteRef:
        key: ceramicraft
        property: SMTP_EMAIL_FROM
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: ceramicraft
        property: SMTP_PASSWORD
    - secretKey: ZITADEL_APP_API_KEY
      remoteRef:
        key: ceramicraft
        property: ZITADEL_APP_API_KEY
    - secretKey: ZITADEL_SERVICE_API_KEY
      remoteRef:
        key: ceramicraft
        property: ZITADEL_SERVICE_API_KEY