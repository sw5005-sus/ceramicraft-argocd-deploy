apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://hashicorp-vault.vault.svc.cluster.local:8200" 
      path: "secret"
      version: "v2"
      caProvider:
        type: Secret
        name: vault-server-tls
        namespace: vault
        key: tls.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "vault-backend-role"
          serviceAccountRef:
            name: "external-secrets-sa"
            namespace: "external-secrets"