apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: zitadel-auth
  namespace: default
spec:
  forwardAuth:
    address: http://user-ms-svc.default.svc.cluster.local:8080/oauth/v1/verify
    trustForwardHeader: true
    authResponseHeaders:
      - "X-Original-User-ID"

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: global-cors
  namespace: default
spec:
  headers:
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "OPTIONS"
      - "PUT"
      - "DELETE"
    accessControlAllowHeaders:
      - "Authorization"    # Zitadel Auth
      - "Content-Type"     # JSON request
      - "X-Requested-With" # AJAX requests
      - "Accept"           # Response content types
      - "Origin"
    accessControlAllowOriginList:
      - "https://admin.ntdoc.site"
    accessControlAllowCredentials: true
    addVaryHeader: true

---
# Middleware: HTTP to HTTPS redirect
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: default
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: secured-api-chain
  namespace: default
spec:
  chain:
    middlewares:
      - name: global-cors   # handles CORS for all API routes 
      - name: zitadel-auth

---
# HTTP IngressRoute — redirect all traffic to HTTPS
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: backend-routes-http-redirect
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.ntdoc.site`)
      kind: Rule
      services:
        - name: noop@internal
          kind: TraefikService
      middlewares:
        - name: redirect-to-https
---
# HTTPS IngressRoute — main routes with TLS
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: backend-routes
  namespace: default
spec:
  entryPoints:
    - websecure
  tls: {}
  routes:
    # User Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/user-ms`) || PathPrefix(`/user-ms`))
      kind: Rule
      services:
        - name: user-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

    # Payment Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/payment-ms`) || PathPrefix(`/payment-ms`))
      kind: Rule
      services:
        - name: payment-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

    # Order Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/order-ms`) || PathPrefix(`/order-ms`))
      kind: Rule
      services:
        - name: order-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

    # Product Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/product-ms`) || PathPrefix(`/product-ms`))
      kind: Rule
      services:
        - name: product-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

    # Comment Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/comment-ms`) || PathPrefix(`/comment-ms`))
      kind: Rule
      services:
        - name: comment-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

---
# ============================================================
# ArgoCD UI — accessible via https://argocd.ntdoc.site
# (no zitadel-auth, ArgoCD has its own authentication)
# ============================================================
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-route
  namespace: default
spec:
  entryPoints:
    - websecure
  tls: {}
  routes:
    - match: Host(`argocd.ntdoc.site`)
      kind: Rule
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
---
# ArgoCD HTTP redirect
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-route-http-redirect
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.ntdoc.site`)
      kind: Rule
      services:
        - name: noop@internal
          kind: TraefikService
      middlewares:
        - name: redirect-to-https

