# TLS Certificate for api.ntdoc.site (must be in default namespace for Traefik to access)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-ntdoc-site-tls
  namespace: default
spec:
  secretName: api-ntdoc-site-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.ntdoc.site
    - argocd.ntdoc.site
  duration: 2160h    # 90 days
  renewBefore: 360h  # renew 15 days before expiry
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: zitadel-auth
  namespace: default
spec:
  forwardAuth:
    address: http://user-ms-svc.default.svc.cluster.local:8080/oauth/v1/verify
    trustForwardHeader: true
    authResponseHeaders:
      - "X-Original-User-ID"
---
# Middleware: HTTP to HTTPS redirect
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: default
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTP IngressRoute — redirect all traffic to HTTPS
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: backend-routes-http-redirect
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.ntdoc.site`)
      kind: Rule
      services:
        - name: noop@internal
          kind: TraefikService
      middlewares:
        - name: redirect-to-https
---
# HTTPS IngressRoute — main routes with TLS
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: backend-routes
  namespace: default
spec:
  entryPoints:
    - websecure
  tls:
    secretName: api-ntdoc-site-tls-secret
  routes:
    # User Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/user-ms`) || PathPrefix(`/user-ms`))
      kind: Rule
      services:
        - name: user-ms-svc
          port: 8080
      middlewares:
        - name: zitadel-auth

    # Payment Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/payment-ms`) || PathPrefix(`/payment-ms`))
      kind: Rule
      services:
        - name: payment-ms-svc
          port: 8080
      middlewares:
        - name: zitadel-auth

    # Order Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/order-ms`) || PathPrefix(`/order-ms`))
      kind: Rule
      services:
        - name: order-ms-svc
          port: 8080
      middlewares:
        - name: zitadel-auth

    # Product Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/product-ms`) || PathPrefix(`/product-ms`))
      kind: Rule
      services:
        - name: product-ms-svc
          port: 8080
      middlewares:
        - name: zitadel-auth

    # Comment Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/comment-ms`) || PathPrefix(`/comment-ms`))
      kind: Rule
      services:
        - name: comment-ms-svc
          port: 8080
      middlewares:
        - name: zitadel-auth

---
# ============================================================
# ArgoCD UI — accessible via https://argocd.ntdoc.site
# (no zitadel-auth, ArgoCD has its own authentication)
# ============================================================
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-route
  namespace: default
spec:
  entryPoints:
    - websecure
  tls:
    secretName: api-ntdoc-site-tls-secret
  routes:
    - match: Host(`argocd.ntdoc.site`)
      kind: Rule
      services:
        - name: argocd-server
          namespace: argocd
          port: 443
          scheme: https
---
# ArgoCD HTTP redirect
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-route-http-redirect
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.ntdoc.site`)
      kind: Rule
      services:
        - name: noop@internal
          kind: TraefikService
      middlewares:
        - name: redirect-to-https

