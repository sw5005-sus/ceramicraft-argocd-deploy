apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: zitadel-auth
  namespace: default
spec:
  forwardAuth:
    address: http://user-ms-svc.default.svc.cluster.local:8080/oauth/v1/verify
    trustForwardHeader: true
    authResponseHeaders:
      - "X-Original-User-ID"
      - "Set-Cookie"

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: default
spec:
  rateLimit:
    average: 100
    burst: 50
    period: 1m
    sourceCriterion:
      ipStrategy:
        depth: 1

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: global-cors
  namespace: default
spec:
  headers:
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "OPTIONS"
      - "PUT"
      - "DELETE"
      - "PATCH"
    accessControlAllowHeaders:
      - "Authorization"
      - "Content-Type"
      - "X-Requested-With"
      - "Accept"
      - "Origin"
    accessControlAllowOriginList:
      - "https://ntdoc.site"
      - "https://admin.ntdoc.site"
    accessControlAllowCredentials: true
    accessControlMaxAge: 86400
    addVaryHeader: true

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: default
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    frameDeny: true
    forceSTSHeader: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    customResponseHeaders:
      Content-Security-Policy: "default-src 'self'; script-src 'self'; object-src 'none'"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "camera=(), microphone=(), geolocation=()"
      X-Robots-Tag: "noindex, nofollow"

---
# Middleware: HTTP to HTTPS redirect
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: default
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: secured-api-chain
  namespace: default
spec:
  chain:
    middlewares:
      - name: rate-limit
      - name: global-cors
      - name: security-headers
      - name: zitadel-auth

---
# HTTP IngressRoute — redirect all traffic to HTTPS
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: backend-routes-http-redirect
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.ntdoc.site`)
      kind: Rule
      services:
        - name: noop@internal
          kind: TraefikService
      middlewares:
        - name: redirect-to-https

---
# HTTPS IngressRoute — main routes with TLS
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: backend-routes
  namespace: default
spec:
  entryPoints:
    - websecure
  tls: {}
  routes:
    # OPTIONS preflight — CORS only, no auth (priority 200)
    - match: Host(`api.ntdoc.site`) && Method(`OPTIONS`)
      kind: Rule
      priority: 200
      services:
        - name: noop@internal
          kind: TraefikService
      middlewares:
        - name: global-cors

    # User Service — authenticated routes (catch-all)
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/user-ms`) || PathPrefix(`/user-ms`))
      kind: Rule
      services:
        - name: user-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

    # Payment Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/payment-ms`) || PathPrefix(`/payment-ms`))
      kind: Rule
      services:
        - name: payment-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

    # Order Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/order-ms`) || PathPrefix(`/order-ms`))
      kind: Rule
      services:
        - name: order-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

    # Product Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/product-ms`) || PathPrefix(`/product-ms`))
      kind: Rule
      services:
        - name: product-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

    # Comment Service
    - match: Host(`api.ntdoc.site`) && (PathPrefix(`/api/comment-ms`) || PathPrefix(`/comment-ms`))
      kind: Rule
      services:
        - name: comment-ms-svc
          port: 8080
      middlewares:
        - name: secured-api-chain

---
# ============================================================
# ArgoCD UI — accessible via https://argocd.ntdoc.site
# (no zitadel-auth, ArgoCD has its own authentication)
# ============================================================
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-route
  namespace: default
spec:
  entryPoints:
    - websecure
  tls: {}
  routes:
    - match: Host(`argocd.ntdoc.site`)
      kind: Rule
      services:
        - name: argocd-server
          namespace: argocd
          port: 80

---
# ArgoCD HTTP redirect
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-route-http-redirect
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.ntdoc.site`)
      kind: Rule
      services:
        - name: noop@internal
          kind: TraefikService
      middlewares:
        - name: redirect-to-https
