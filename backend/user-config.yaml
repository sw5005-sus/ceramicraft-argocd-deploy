apiVersion: v1
kind: ConfigMap
metadata:
  name: user-ms-config
data:
  config.yml: |
    grpc:
      host: "0.0.0.0"
      port: 5001
      connect_timeout: 3
      max_pool_size: 200

    http:
      host: "0.0.0.0"
      port: 8080

    log:
      level: debug
      file_path: ./logs/ceramicraft-user-mservice.log

    mysql:
      host: "172.31.2.221"
      port: "3306"
      userName: "root"
      dbName: "user_db"

    email:
      smtp_host: "smtp.qq.com"

    kafka:
      brokers: 
        - "172.31.2.221:29092"
      user_activated_topic: "user-activated"
      max_bytes: 1048576
      acks: 1
      retries: 3
      batch_timeout_millis: 5
      batch_size: 16384
    
    redis:
      host: "172.31.2.221"
      port: "6379"
    
    zitadel:
      host: "https://cerami-t6ihrd.us1.zitadel.cloud"
      client_id: "361761429302373082"
      app_client_id: "361761429302373082"
      admin_client_id: "364221631029152417"
      oauth_callback_url: "https://api.ntdoc.site/user-ms/v1/merchant/login-callback"
    
    system:
      home_url: "https://admin.ntdoc.site"
